<!DOCTYPE html>
<html>
<head>
  <title>Glass Water Sort lite</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #1e1e2f;
      color: white;
    }

    h1 { margin-top: 20px; }
    h2 { margin-top: 20px; }

    /* Wider container for spaced bottles */
    .container {
    display: flex;
    justify-content: center;
    padding-top: 119px;
    flex-wrap: wrap;
    width: 90%;
    margin-left: auto;
    margin-right: auto;
    gap: 40px;
}

    .glass {
      width: 60px;
      height: 180px;
      cursor: pointer;
      display: flex;
      flex-direction: column-reverse;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.35);
      border-radius: 0 0 25px 25px;
      background: rgba(255,255,255,0.08);
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.2),
        inset 0 -5px 15px rgba(0,0,0,0.2),
        0 3px 10px rgba(0,0,0,0.3);
      backdrop-filter: blur(3px);
      transition: transform 0.5s ease;
    }

    .glass.pouring-left { transform: rotate(120deg) translateX(10px); }
    .glass.pouring-right  { transform: rotate(-120deg) translateX(-10px); }

    .layer {
      width: 100%;
      height: 25%;
      border-top: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px 4px 0 0;
      transition: all 0.5s ease;
    }

    button{
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 30px;
    }
    button:hover{
      background-color:#c3b2b2;
    }
  </style>
</head>
<body>

<h1>Glass Water Sort lite</h1>
<h2 id="levelText">Level 1</h2>

<div class="container" id="game"></div>

<button onclick="restart()">Restart</button>
<button onclick="nextLevel()">Next Level</button>

<script>
let totalLevels = 230;
let currentLevel = 0;
let glasses = [];
let selected = null;
let levelPassed = false;

const colorsList = [
  "red","blue","green","yellow","purple",
  "orange","cyan","pink","lime","magenta"
];

function generateLevel(level) {
  let colorCount = Math.min(3 + Math.floor(level / 10), colorsList.length);
  let emptyGlasses = 2 + Math.floor(level / 30);
  let selectedColors = colorsList.slice(0, colorCount);
  let temp = [];
  selectedColors.forEach(color => { for(let i=0;i<4;i++) temp.push(color); });
  temp.sort(() => Math.random() - 0.5);

  let totalGlasses = colorCount + emptyGlasses;
  let newGlasses = Array.from({ length: totalGlasses }, () => []);
  temp.forEach(color => {
    let placed = false;
    while(!placed){
      let g = Math.floor(Math.random()*totalGlasses);
      if(newGlasses[g].length < 4){
        newGlasses[g].push(color);
        placed = true;
      }
    }
  });
  return newGlasses;
}

function loadLevel() {
  glasses = generateLevel(currentLevel);
  selected = null;
  levelPassed = false;
  document.getElementById("levelText").innerText = "Level " + (currentLevel + 1);
  draw();
}

function draw() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  glasses.forEach((glass, i) => {
    const div = document.createElement("div");
    div.className = "glass";

    glass.forEach(color => {
      const layer = document.createElement("div");
      layer.className = "layer";
      layer.style.background = color;
      div.appendChild(layer);
    });

    div.onclick = () => handleClick(i);
    game.appendChild(div);
  });
}

function handleClick(i) {
  if (selected === null) {
    selected = i;
  } else {
    pourWithAnimation(selected, i);
    selected = null;
  }
}

// Only rotate if transfer is possible
function pourWithAnimation(from, to) {
  if(from===to || glasses[from].length===0 || glasses[to].length>=4) return;

  let color = glasses[from][glasses[from].length-1];
  if(glasses[to].length>0 && glasses[to][glasses[to].length-1]!==color) return;

  let glassFrom = document.getElementsByClassName("glass")[from];
  let direction = to > from ? 'pouring-left' : 'pouring-right';
  glassFrom.classList.add(direction);

  setTimeout(()=>{
    glasses[from].pop();
    glasses[to].push(color);
    glassFrom.classList.remove(direction);
    draw();
    checkWin();
  }, 500);
}

function checkWin() {
  let win = glasses.every(g => g.length===0 || (g.length===4 && g.every(c=>c===g[0])));
  if(win){
    levelPassed=true;
    setTimeout(()=>alert("🎉 Level Complete! Click Next Level"), 100);
  }
}

function restart() { loadLevel(); }

function nextLevel() {
  if(!levelPassed){ alert("❌ First complete the level!"); return; }
  currentLevel++;
  if(currentLevel>=totalLevels){ alert("🏆 You finished all 230 levels!"); currentLevel=0; }
  loadLevel();
}

loadLevel();
</script>
</body>
</html>
